name: memory_aide_app
description: CareSoul – Smart Medication Audio Assistant
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # REST API
  http: ^1.2.1
  http_parser: ^4.0.2

  # Local storage for JWT token
  shared_preferences: ^2.2.2

  # Image picker (prescription/profile)
  image_picker: ^1.0.7

  # File picker (music upload)
  file_picker: ^6.1.1

  # Audio playback
  audioplayers: ^6.0.0

  # Audio recording
  record: ^5.0.0

  # Date/time formatting
  intl: ^0.19.0

  # Path utilities
  path: ^1.9.0
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/